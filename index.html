<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🚀 Federated Space Grid Leaderboard</title>
    <style>
      :root {
        --bg-color: #0b0e14;
        --card-bg: #161b22;
        --accent-color: #00ffcc;
        --text-color: #ecf0f1;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h1 {
        color: var(--accent-color);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 5px;
        text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
      }
      .subtitle {
        color: #8b949e;
        margin-bottom: 40px;
        font-size: 1.1rem;
      }
      .leaderboard-box {
        width: 100%;
        max-width: 600px;
        background: var(--card-bg);
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        margin: 10px 0;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        border-left: 4px solid #30363d;
      }
      .row.top-three {
        border-left-color: var(--accent-color);
        background: rgba(0, 255, 204, 0.05);
      }
      .identity {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .rank {
        font-weight: bold;
        color: var(--accent-color);
        font-size: 1.2rem;
        width: 30px;
      }
      .username {
        font-size: 1.1rem;
        font-weight: 500;
      }
      .score {
        font-family: "Courier New", Courier, monospace;
        font-size: 1.3rem;
        font-weight: bold;
        color: #ffffff;
      }
      .empty-state {
        text-align: center;
        color: #8b949e;
        padding: 40px 0;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>📡 Federated Activity Feed</h1>
    <div class="subtitle">
      Real-time aggregate data broadcasted via student Web 3.0 Outboxes
    </div>

    <div class="leaderboard-box">
      <div id="leaderboard-target">
        <div class="empty-state">
          Waiting for students to broadcast game activities...
        </div>
      </div>
    </div>

    <script>
      async function fetchLeaderboard() {
        try {
          const response = await fetch("/federated/leaderboard");
          const data = await response.json();
          const container = document.getElementById("leaderboard-target");

          if (!data.leaderboard || data.leaderboard.length === 0) {
            container.innerHTML =
              '<div class="empty-state">Waiting for students to broadcast game activities...</div>';
            return;
          }

          container.innerHTML = data.leaderboard
            .map(
              (player, index) => `
                    <div class="row ${index < 3 ? "top-three" : ""}">
                        
                            <span class="rank">#${index + 1}</span>
                            <span class="username">🛸 ${escapeHtml(
                              player.username
                            )}</span>
                        </div>
                        <span class="score">${player.score.toLocaleString()} PTS</span>
                    </div>
                `
            )
            .join("");
        } catch (err) {
          console.error("Error updating dashboard view:", err);
        }
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      setInterval(fetchLeaderboard, 2000);
      fetchLeaderboard();
    </script>
  </body>
</html>

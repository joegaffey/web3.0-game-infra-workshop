<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Control Lists Governance</title>
    <style>
        body { font-family: monospace; background: #0f0f1a; color: #00ffcc; padding: 40px; max-width: 500px; margin: auto; }
        button { width: 100%; padding: 12px; background: #4ecca3; border: none; color: #1a1a2e; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background: #45b391; }
        a { color: #ff007f; text-decoration: none; display: inline-block; margin-top: 20px; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h2>🔒 Pod Access Control Settings (ACL)</h2>
    <p>Identity Workspace Handle Scope: <strong id="userTitle" style="color:#e94560;">...</strong></p>
    <hr style="border-color:#2b2b40; margin:20px 0;">
    
    <label><input type="checkbox" id="readAccess"> Grant Central Server Audit Visibility to Telemetry File</label><br><br>
    <label><input type="checkbox" id="optInGlobal"> Opt-In Content Broadcasting to Room ActivityPub Feed</label><br><br>
    
    <button onclick="saveAcl()">Update Sovereign Authorization Boundaries</button>
    <br>
    <a id="backToVault" href="#">[View Your Achievements Vault]</a>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const internId = urlParams.get('id') || 'intern_01';
        document.getElementById('userTitle').innerText = internId;
        document.getElementById('backToVault').href = `/view-achievements.html?id=${internId}`;

        // Fetch current baseline rules to sync the checkboxes
        fetch(`/api/pod/${internId}/acl`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('readAccess').checked = data.readAllowed;
                document.getElementById('optInGlobal').checked = data.globalOptIn;
            });

        function saveAcl() {
            fetch(`/api/pod/${internId}/acl`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    readAllowed: document.getElementById('readAccess').checked,
                    globalOptIn: document.getElementById('optInGlobal').checked
                })
            }).then(() => alert('Sovereign rule configurations saved to Pod context!'));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Arcade — Leaderboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1628 100%);
            min-height: 100vh;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px 20px 10px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 50%, rgba(139, 92, 246, 0.1), transparent 60%);
            pointer-events: none;
        }

        .hero__title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .hero__tagline {
            font-size: 0.85rem;
            color: #8b5cf6;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-left: 2px solid rgba(139, 92, 246, 0.4);
            padding-left: 12px;
        }

        .audio-toggle {
            position: absolute;
            right: 20px;
            padding: 8px 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .audio-toggle:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .audio-toggle--on { border-color: #10b981; color: #10b981; }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 30px 40px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .panel--leaderboard { --accent: #f59e0b; }
        .panel--feed { --accent: #8b5cf6; }

        .panel__title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel--leaderboard .panel__title { color: #f59e0b; }
        .panel--feed .panel__title { color: #8b5cf6; }

        /* Leaderboard styles */
        .leaderboard { list-style: none; }

        .leaderboard__entry {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            margin-bottom: 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s, background 0.2s;
        }

        .leaderboard__entry:hover {
            transform: translateX(4px);
            background: rgba(255, 255, 255, 0.05);
        }

        .leaderboard__entry--gold {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
            border-color: rgba(245, 158, 11, 0.3);
        }

        .leaderboard__entry--silver {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.1), rgba(192, 192, 192, 0.03));
            border-color: rgba(192, 192, 192, 0.2);
        }

        .leaderboard__entry--bronze {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.1), rgba(205, 127, 50, 0.03));
            border-color: rgba(205, 127, 50, 0.2);
        }

        .leaderboard__rank {
            font-size: 1.5rem;
            width: 44px;
            text-align: center;
            flex-shrink: 0;
        }

        .leaderboard__name {
            flex: 1;
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
        }

        .leaderboard__name:hover {
            color: #8b5cf6;
        }

        .leaderboard__score {
            font-size: 1.1rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: #f59e0b;
        }

        .leaderboard__time {
            font-size: 0.75rem;
            color: #666;
            margin-left: 12px;
            min-width: 70px;
            text-align: right;
        }

        /* Feed styles */
        .feed { list-style: none; }

        .feed__item {
            padding: 14px 16px;
            margin-bottom: 8px;
            border-radius: 10px;
            background: rgba(139, 92, 246, 0.05);
            border: 1px solid rgba(139, 92, 246, 0.1);
            animation: slideIn 0.3s ease-out;
        }

        .feed__item__header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b5cf6;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .feed__item__text {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #d0d0d0;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
            font-style: italic;
            font-size: 1rem;
        }

        .empty-state__icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 800px) {
            .container {
                grid-template-columns: 1fr;
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
    <header class="hero">
        <h1 class="hero__title">🕹️ The Last Arcade</h1>
        <p class="hero__tagline">Indie Gaming Community</p>
        <button class="audio-toggle" id="audioToggle" onclick="toggleAudio()">🔇 Audio Off</button>
    </header>
    <div class="container">
        <!-- Leaderboard -->
        <div class="panel panel--leaderboard">
            <h1 class="panel__title">🏆 High Scores</h1>
            <ol class="leaderboard" id="leaderboard">
                <li class="empty-state">
                    <div class="empty-state__icon">🎮</div>
                    Waiting for players...
                </li>
            </ol>
        </div>

        <!-- Activity Feed -->
        <div class="panel panel--feed">
            <h1 class="panel__title">📡 Live Feed</h1>
            <ul class="feed" id="feed">
                <li class="empty-state">
                    <div class="empty-state__icon">🛰️</div>
                    No activity yet...
                </li>
            </ul>
        </div>
    </div>

    <script>
        // Audio system
        let audioEnabled = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function toggleAudio() {
            audioEnabled = !audioEnabled;
            const btn = document.getElementById('audioToggle');
            if (audioEnabled) {
                btn.textContent = '🔊 Audio On';
                btn.classList.add('audio-toggle--on');
                audioCtx.resume();
            } else {
                btn.textContent = '🔇 Audio Off';
                btn.classList.remove('audio-toggle--on');
            }
        }

        function playSfx(freq, duration) {
            if (!audioEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function speak(text) {
            if (!audioEnabled || !('speechSynthesis' in window)) return;
            const cleaned = text.replace(/_/g, ' ');
            const utterance = new SpeechSynthesisUtterance(cleaned);
            utterance.rate = 1.1;
            utterance.pitch = 1.0;
            speechSynthesis.speak(utterance);
        }

        const rankMedals = ['🥇', '🥈', '🥉'];

        function renderLeaderboard(data) {
            const el = document.getElementById('leaderboard');
            if (!data || data.length === 0) {
                el.innerHTML = '<li class="empty-state"><div class="empty-state__icon">🎮</div>Waiting for players...</li>';
                return;
            }

            el.innerHTML = data.map((player, i) => {
                const tierClass = i === 0 ? 'leaderboard__entry--gold' :
                                  i === 1 ? 'leaderboard__entry--silver' :
                                  i === 2 ? 'leaderboard__entry--bronze' : '';
                const medal = rankMedals[i] || `<span style="color:#666;">${i + 1}</span>`;

                return `<li class="leaderboard__entry ${tierClass}">
                    <span class="leaderboard__rank">${medal}</span>
                    <a class="leaderboard__name" href="/view-achievements.html?id=${encodeURIComponent(player.username)}">${escapeHtml(player.username)}</a>
                    <span class="leaderboard__score">${player.score.toLocaleString()} pts</span>
                    <span class="leaderboard__time">${player.timestamp}</span>
                </li>`;
            }).join('');
        }

        function renderFeed(data) {
            const el = document.getElementById('feed');
            if (!data || data.length === 0) {
                el.innerHTML = '<li class="empty-state"><div class="empty-state__icon">🛰️</div>No activity yet...</li>';
                return;
            }

            el.innerHTML = data.map(act => {
                return `<li class="feed__item">
                    <div class="feed__item__header">Achievement Unlocked</div>
                    <div class="feed__item__text">${escapeHtml(act.summary)}</div>
                </li>`;
            }).join('');
        }

        let lastLeaderboardJSON = '';
        let lastFeedJSON = '';
        let currentLeader = '';

        function playLeaderSfx() {
            if (!audioEnabled) return;
            // Fanfare: ascending arpeggio
            playSfx(523, 0.12);
            setTimeout(() => playSfx(659, 0.12), 130);
            setTimeout(() => playSfx(784, 0.12), 260);
            setTimeout(() => playSfx(1047, 0.3), 390);
        }

        function refresh() {
            fetch('/outbox?filter=scores')
                .then(res => res.json())
                .then(data => {
                    const items = data.orderedItems || [];
                    const leaderboard = items.map(item => ({
                        username: item.actor,
                        score: item.object.score,
                        timestamp: item.object.published
                    }));
                    const json = JSON.stringify(leaderboard);
                    if (json !== lastLeaderboardJSON) {
                        const isFirstLoad = !lastLeaderboardJSON;
                        if (!isFirstLoad) playSfx(880, 0.15);
                        lastLeaderboardJSON = json;
                        renderLeaderboard(leaderboard);

                        // Check for new leader
                        const newLeader = leaderboard.length > 0 ? leaderboard[0].username : '';
                        if (!isFirstLoad && newLeader && newLeader !== currentLeader) {
                            setTimeout(() => {
                                playLeaderSfx();
                                setTimeout(() => speak(`${newLeader} is the new leader!`), 500);
                            }, 300);
                        }
                        currentLeader = newLeader;
                    }
                })
                .catch(() => {});

            fetch('/outbox?filter=badges')
                .then(res => res.json())
                .then(data => {
                    const items = data.orderedItems || [];
                    const json = JSON.stringify(items);
                    if (json !== lastFeedJSON) {
                        const isFirstLoad = !lastFeedJSON;
                        if (!isFirstLoad) {
                            playSfx(660, 0.1);
                            setTimeout(() => playSfx(880, 0.1), 120);
                            setTimeout(() => playSfx(1100, 0.2), 240);
                            // TTS after SFX completes
                            const newItem = items[0];
                            if (newItem && newItem.summary) {
                                const cleanText = newItem.summary.replace(/[🚀🏅🔥💀☠️👑🎮🕹️🏠⭐🌟☀️💥⏱️]/gu, '').trim();
                                setTimeout(() => speak(cleanText), 500);
                            }
                        }
                        lastFeedJSON = json;
                        renderFeed(items);
                    }
                })
                .catch(() => {});
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        setInterval(refresh, 2000);
        refresh();
    </script>
</body>
</html>

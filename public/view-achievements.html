<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Arcade — My Achievements</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1628 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 40px;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px 20px;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 50%, rgba(139, 92, 246, 0.1), transparent 60%);
            pointer-events: none;
        }

        .hero__title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .hero__tagline {
            font-size: 0.85rem;
            color: #8b5cf6;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-left: 2px solid rgba(139, 92, 246, 0.4);
            padding-left: 12px;
        }

        .container {
            width: 100%;
            max-width: 550px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .panel--profile { --accent: #06b6d4; }
        .panel--badges { --accent: #f59e0b; }

        .panel__title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel--profile .panel__title { color: #06b6d4; }
        .panel--badges .panel__title { color: #f59e0b; }

        /* Profile / Score */
        .profile__username {
            font-size: 1.1rem;
            color: #999;
            margin-bottom: 20px;
        }

        .profile__username span {
            color: #fff;
            font-weight: 600;
        }

        .score-display {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 20px;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 12px;
        }

        .score-display__label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #06b6d4;
            font-weight: 600;
        }

        .score-display__value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .score-display__unit {
            font-size: 1rem;
            color: #666;
        }

        /* Badges */
        .badges-list { list-style: none; }

        .badge {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            margin-bottom: 10px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.03));
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge__icon {
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .badge__info { flex: 1; }

        .badge__name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
        }

        .badge__desc {
            font-size: 0.8rem;
            color: #888;
            margin-top: 2px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            font-style: italic;
        }

        .empty-state__icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 30px 20px;
            color: #ef4444;
            font-weight: 600;
        }

        /* Navigation */
        .nav {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .nav__link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
        }

        .nav__link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
    </style>
</head>
<body>
    <header class="hero">
        <h1 class="hero__title">🕹️ The Last Arcade</h1>
        <p class="hero__tagline">Indie Gaming Community</p>
    </header>
    <div class="container">
        <!-- Profile & Score -->
        <div class="panel panel--profile">
            <h1 class="panel__title">🛸 Player Profile</h1>
            <p class="profile__username">Player: <span id="username">...</span></p>
            <div class="score-display" id="scoreDisplay" style="display:none;">
                <div>
                    <div class="score-display__label">High Score</div>
                    <div><span class="score-display__value" id="highscore">0</span> <span class="score-display__unit">pts</span></div>
                </div>
            </div>
            <div id="profileError"></div>
        </div>

        <!-- Badges -->
        <div class="panel panel--badges">
            <h1 class="panel__title">🏅 Badges</h1>
            <ul class="badges-list" id="badges">
                <li class="empty-state">
                    <div class="empty-state__icon">🎯</div>
                    Loading...
                </li>
            </ul>
        </div>

        <!-- Navigation -->
        <nav class="nav">
            <a class="nav__link" id="lnkAcl" href="#">⚙️ Permissions</a>
            <a class="nav__link" href="/global-leaderboard.html">🏆 Leaderboard</a>
            <a class="nav__link" href="/">🏠 Home</a>
        </nav>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const internId = urlParams.get('id') || 'intern_01';

        document.getElementById('username').textContent = internId;
        document.getElementById('lnkAcl').href = `/acl.html?id=${internId}`;

        fetch(`/users/${internId}/outbox`)
            .then(res => {
                if (res.status === 403) throw new Error('This user has opted out of public feeds. Enable permissions to view.');
                if (res.status === 404) throw new Error('User not found. Register first.');
                return res.json();
            })
            .then(data => {
                const items = data.orderedItems || [];

                // Find score from Update activity
                const scoreActivity = items.find(item => item.type === 'Update');
                if (scoreActivity) {
                    document.getElementById('highscore').textContent = scoreActivity.object.score.toLocaleString();
                    document.getElementById('scoreDisplay').style.display = 'flex';
                }

                // Find badge announcements
                const badges = items.filter(item => item.type === 'Announce');
                const el = document.getElementById('badges');
                if (badges.length === 0) {
                    el.innerHTML = '<li class="empty-state"><div class="empty-state__icon">🎯</div>No badges yet. Score 5+ to earn your first!</li>';
                    return;
                }

                el.innerHTML = badges.map(act => {
                    const name = act.object ? act.object.name : '';
                    const desc = act.object ? act.object.description : '';
                    const icon = name ? name.split(' ')[0] : '🏅';
                    const label = name ? name.slice(name.indexOf(' ') + 1) : escapeHtml(act.summary);
                    return `<li class="badge">
                        <span class="badge__icon">${icon}</span>
                        <div class="badge__info">
                            <div class="badge__name">${escapeHtml(label)}</div>
                            <div class="badge__desc">${escapeHtml(desc)}</div>
                        </div>
                    </li>`;
                }).join('');
            })
            .catch(err => {
                document.getElementById('profileError').innerHTML = `<div class="error-state">⚠️ ${escapeHtml(err.message)}</div>`;
                document.getElementById('badges').innerHTML = '';
            });

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>
</html>
